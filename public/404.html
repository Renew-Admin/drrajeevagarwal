<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>404 - Page Not Found | Dr. Rajeev Agarwal</title>
    <style>
      :root {
        --deep-teal: #20265c;
        --medical-teal: #04766f;
        --gold: #f1d968;
        --text-soft: #555770;
        --line: rgba(32, 38, 92, 0.12);
        --shadow: 0 24px 70px rgba(32, 38, 92, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--deep-teal);
        background:
          radial-gradient(circle at 12% 10%, rgba(241, 217, 104, 0.24), transparent 24rem),
          linear-gradient(180deg, #ffffff 0%, #f4f6ff 54%, #ffffff 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        min-height: 100vh;
        display: grid;
        align-items: center;
        padding: clamp(36px, 7vw, 88px) clamp(18px, 5vw, 72px);
      }

      .layout {
        width: min(1120px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 0.62fr);
        gap: clamp(28px, 5vw, 64px);
        align-items: center;
      }

      .code {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        margin-bottom: 18px;
        padding: 0 15px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--deep-teal);
        font-size: 13px;
        font-weight: 950;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        box-shadow: 0 12px 30px rgba(32, 38, 92, 0.08);
      }

      h1 {
        max-width: 760px;
        margin: 0 0 20px;
        color: var(--deep-teal);
        font-size: clamp(40px, 6vw, 76px);
        font-weight: 950;
        line-height: 1.02;
        letter-spacing: 0;
      }

      p {
        max-width: 650px;
        margin: 0;
        color: var(--text-soft);
        font-size: clamp(16px, 1.4vw, 19px);
        line-height: 1.78;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 30px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 22px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 900;
      }

      .button-primary {
        background: var(--deep-teal);
        color: #fff;
        box-shadow: 0 14px 28px rgba(32, 38, 92, 0.18);
      }

      .button-soft {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--deep-teal);
      }

      .back {
        display: inline-flex;
        margin-top: 22px;
        color: var(--deep-teal);
        font-size: 14px;
        font-weight: 900;
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: #fff;
        box-shadow: var(--shadow);
      }

      .card-top {
        display: flex;
        gap: 8px;
        padding: 18px 20px;
        background: var(--deep-teal);
      }

      .dot {
        width: 11px;
        height: 11px;
        border-radius: 999px;
        background: var(--gold);
      }

      .dot:nth-child(2) {
        background: rgba(255, 255, 255, 0.72);
      }

      .dot:nth-child(3) {
        background: #0f766e;
      }

      .card-body {
        padding: 30px;
      }

      .card strong {
        display: block;
        margin-bottom: 22px;
        font-size: 20px;
      }

      .line {
        width: 76%;
        height: 12px;
        margin-bottom: 14px;
        border-radius: 999px;
        background: #eef2ff;
      }

      .line.long {
        width: 100%;
      }

      .status {
        margin-top: 26px;
        padding: 16px;
        border-radius: 8px;
        background: rgba(4, 118, 111, 0.1);
        color: var(--medical-teal);
        font-weight: 900;
      }

      @media (max-width: 760px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .card {
          border-radius: 18px;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="layout">
        <div>
          <span class="code">404</span>
          <h1>This page does not exist.</h1>
          <p>
            The page may have moved or the link may be incorrect. Please return to the main website or view the care services.
          </p>
          <div class="actions">
            <a class="button button-primary" href="/">Go Home</a>
            <a class="button button-soft" href="/all-services">View Services</a>
          </div>
          <a class="back" href="/blog">Browse articles instead</a>
        </div>

        <aside class="card" aria-hidden="true">
          <div class="card-top">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
          <div class="card-body">
            <strong>Page diagnosis</strong>
            <div class="line long"></div>
            <div class="line"></div>
            <div class="status">Not found, but recoverable.</div>
          </div>
        </aside>
      </section>
    </main>
  </body>
</html>

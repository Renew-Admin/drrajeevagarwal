services:
  - type: web
    name: drrajeevagarwal
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.20.0
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: WORKSHOP_WEBHOOK
        sync: false
